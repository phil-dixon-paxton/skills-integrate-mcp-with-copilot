<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        body {
            background: #f8f9fa;
            color: #333;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .error-container {
            text-align: center;
            padding: 2rem;
            border-radius: 12px;
            background: #fff;
            box-shadow: 0 2px 16px rgba(0,0,0,0.08);
        }
        .error-title {
            font-size: 3rem;
            color: #4caf50;
        }
        .error-message {
            font-size: 1.2rem;
            margin: 1rem 0;
        }
        .home-link {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 0.75rem 2rem;
            background: #4caf50;
            color: #fff;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            transition: background 0.2s;
        }
        .home-link:hover {
            background: #388e3c;
        }
        .branding {
            margin-top: 2rem;
            font-size: 1rem;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-title">404</div>
        <div class="error-message">Oops! The page you are looking for does not exist.</div>
        <a href="/" class="home-link">Return to Home</a>
        <div class="branding">School Name &mdash; Powered by GitHub Copilot</div>
    </div>
</body>
</html>
